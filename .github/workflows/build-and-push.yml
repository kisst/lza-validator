name: Build and push Docker image

on:
  schedule:
    # Run daily at 06:00 UTC
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  check-release:
    runs-on: ubuntu-latest
    outputs:
      latest_tag: ${{ steps.get-tag.outputs.latest_tag }}
      should_build: ${{ steps.check.outputs.should_build }}
    steps:
      - name: Get latest LZA release tag
        id: get-tag
        run: |
          latest_tag=$(git ls-remote --tags \
            https://github.com/awslabs/landing-zone-accelerator-on-aws.git \
            | sed -n 's|.*refs/tags/\(v[0-9]*\.[0-9]*\.[0-9]*\)$|\1|p' \
            | sort -V | tail -1)
          echo "latest_tag=$latest_tag" >> "$GITHUB_OUTPUT"
          echo "Latest LZA tag: $latest_tag"

      - name: Check if tag already exists on Docker Hub
        id: check
        run: |
          tag="${{ steps.get-tag.outputs.latest_tag }}"
          if docker manifest inspect "kisst/lza-validator:${tag}" > /dev/null 2>&1; then
            echo "Image kisst/lza-validator:${tag} already exists, skipping build"
            echo "should_build=false" >> "$GITHUB_OUTPUT"
          else
            echo "Image kisst/lza-validator:${tag} not found, will build"
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Force build on manual dispatch
        if: github.event_name == 'workflow_dispatch'
        run: echo "should_build=true" >> "$GITHUB_OUTPUT"

  build-and-push:
    needs: check-release
    if: needs.check-release.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clone LZA and checkout release
        run: |
          tag="${{ needs.check-release.outputs.latest_tag }}"
          git clone --depth 1 --branch "$tag" \
            https://github.com/awslabs/landing-zone-accelerator-on-aws.git

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ github.repository_owner }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        run: |
          tag="${{ needs.check-release.outputs.latest_tag }}"
          docker build --tag "kisst/lza-validator:${tag}" .
          docker push "kisst/lza-validator:${tag}"
